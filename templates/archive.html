<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-image: linear-gradient(rgba(11, 22, 59, 0.8), rgba(3, 5, 11, 0.98)), url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-attachment: fixed; background-position: center; color: white; font-family: 'Inter', sans-serif; padding: 40px; }
        .msg-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; margin-bottom: 15px; border-left: 5px solid #f43f5e; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-danger fw-bold mb-4">Silinen / Arşivlenen Mesajlar</h2>
        <a href="/dashboard" class="btn btn-outline-light rounded-3 px-4 mb-4">← Panele Dön</a>
        {% if messages %}
            {% for m in messages %}
            <div class="msg-box">
                <small class="text-primary fw-bold">Kimden: {{ m['sender'] }} | Kime: {{ m['receiver'] }}</small>
                <p class="mb-1 mt-1">{{ m['content'] }}</p>
                <small class="opacity-50 text-white">{{ m['timestamp'] }}</small>
            </div>
            {% endfor %}
        {% else %}
            <p class="opacity-50">Arşivlenmiş mesaj bulunamadı.</p>
        {% endif %}
    </div>
</body>
</html>
