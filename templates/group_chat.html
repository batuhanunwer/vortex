<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background-image: linear-gradient(rgba(11, 22, 59, 0.8), rgba(3, 5, 11, 0.98)), url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-attachment: fixed; background-position: center; color: white; font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; margin: 0; }
        .sidebar { width: 320px; background: rgba(1, 4, 18, 0.9); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.05); padding: 30px; display: flex; flex-direction: column; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background-image: linear-gradient(rgba(11, 22, 59, 0.8), rgba(3, 5, 11, 0.98)), url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-attachment: fixed; background-position: center; }
        .msg-area { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; }
        .bubble { background: rgba(255,255,255,0.05); padding: 15px 20px; border-radius: 20px; margin-bottom: 12px; max-width: 80%; border: 1px solid rgba(255,255,255,0.03); }
        .me { align-self: flex-end; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; }
        .avatar-gp { width: 35px; height: 35px; border-radius: 10px; margin-right: 10px; object-fit: cover; }
        .initial-avatar-gp { display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 800; color: white; background: linear-gradient(135deg, #3b82f6, #1d4ed8); text-transform: uppercase; }
        .member-tag { padding: 5px 12px; background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-radius: 10px; font-size: 0.8rem; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="/groups" class="text-secondary text-decoration-none small mb-4 d-block">← Gruplarıma Dön</a>
        <h3 class="text-primary fw-bold mb-1"># {{ room_name }}</h3>
        <p class="text-secondary small mb-4">Grup Sohbeti</p>
        
        <div class="mb-4 pt-3 border-top border-secondary border-opacity-25">
            <label class="small text-secondary mb-2">ÜYE EKLE</label>
            <form method="POST" class="d-flex gap-2">
                <input name="new_member" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="Kullanıcı adı..." required>
                <button class="btn btn-sm btn-primary">EKLE</button>
            </form>
        </div>

        <div class="flex-grow-1 overflow-auto">
            <label class="small text-secondary mb-2">ÜYELER</label>
            <div>{% for m in members %}<div class="member-tag">@{{ m }}</div>{% endfor %}</div>
        </div>

        <div class="mt-auto pt-3 border-top border-danger border-opacity-10">
            <form action="{{ url_for('groups.leave_group', room_id=room_id) }}" method="POST" onsubmit="return confirm('Ayrılmak istediğine emin misin?')">
                <button type="submit" class="btn btn-sm btn-outline-danger w-100 fw-bold text-uppercase">Gruptan Ayrıl</button>
            </form>
        </div>
    </div>

    <div class="chat-main">
        <div class="msg-area" id="box">
            {% for m in messages %}
            <div class="bubble {% if m['sender'] == session['user'] %}me{% endif %}">
                <div class="d-flex align-items-center mb-1">
                    {% if m['profile_pic'] == 'default.png' %}
                        <div class="avatar-gp initial-avatar-gp">{{ m['sender'][0]|upper }}</div>
                    {% else %}
                        <img src="{{ url_for('static', filename='uploads/' + m['profile_pic']) }}" class="avatar-gp">
                    {% endif %}
                    <small class="fw-bold">@{{ m['sender'] }}</small>
                </div>
                <div>{{ m['content'] }}</div>
                <small class="opacity-50 d-block mt-1" style="font-size: 0.6rem;">{{ m['timestamp'] }}</small>
            </div>
            {% endfor %}
        </div>
        <div class="input-area p-4 border-top border-secondary border-opacity-10">
            <form id="groupForm" class="d-flex gap-3">
                <input id="inp" class="form-control bg-dark border-secondary text-white rounded-3 px-4" placeholder="Mesaj yaz..." required autocomplete="off">
                <button type="submit" class="btn btn-primary px-5 rounded-3 fw-bold">GÖNDER</button>
            </form>
        </div>
    </div>
    <script>
        const socket = io();
        const roomId = {{ room_id }};
        const myUser = "{{ session['user'] }}";
        const b = document.getElementById('box'); b.scrollTop = b.scrollHeight;
        window.onload = () => document.getElementById('inp').focus();

        document.getElementById('groupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const inp = document.getElementById('inp');
            socket.emit('group_message', { room_id: roomId, content: inp.value });
            inp.value = '';
        });

        socket.on('new_message', function(msg) {
            if(msg.type === 'group' && msg.room_id == roomId) {
                const bubble = document.createElement('div');
                bubble.className = "bubble " + (msg.sender === myUser ? "me" : "");
                
                let avatarHtml = '';
                if(msg.profile_pic === 'default.png') {
                    avatarHtml = `<div class="avatar-gp initial-avatar-gp">${msg.sender.charAt(0).toUpperCase()}</div>`;
                } else {
                    avatarHtml = `<img src="/static/uploads/${msg.profile_pic}" class="avatar-gp">`;
                }

                bubble.innerHTML = `
                    <div class="d-flex align-items-center mb-1">
                        ${avatarHtml}
                        <small class="fw-bold">@${msg.sender}</small>
                    </div>
                    <div>${msg.content}</div>
                    <small class="opacity-50 d-block mt-1" style="font-size: 0.6rem;">${msg.timestamp}</small>
                `;
                b.appendChild(bubble);
                b.scrollTop = b.scrollHeight;
            }
        });
    </script>
</body>
</html>
