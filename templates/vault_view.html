<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasa — {{ item.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-image: linear-gradient(rgba(11, 22, 59, 0.8), rgba(3, 5, 11, 0.98)), url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-attachment: fixed; background-position: center;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .shell {
            max-width: 720px;
            margin: 0 auto;
        }

        .card-v {
            background: rgba(9, 14, 30, 0.85);
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 16px;
            padding: 1.75rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        }

        h1 {
            font-weight: 800;
            font-size: 1.35rem;
            margin-bottom: 0.25rem;
            background: linear-gradient(to right, #93c5fd, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .meta {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
        }

        pre.secret {
            white-space: pre-wrap;
            word-break: break-word;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1rem 1.1rem;
            color: #f1f5f9;
            margin: 0;
            min-height: 120px;
        }

        .btn-back {
            border-radius: 10px;
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: #bfdbfe;
            background: transparent;
        }

        .btn-back:hover {
            background: rgba(59, 130, 246, 0.15);
            color: #e0e7ff;
        }
    </style>
</head>

<body>
    <div class="shell">
        <a class="btn btn-back btn-sm mb-3" href="{{ url_for('vault.vault') }}"><i class="fas fa-arrow-left"></i>
            Kasaya dön</a>

        <div class="card-v">
            <h1><i class="fas fa-lock me-2"></i>{{ item.title }}</h1>
            <div class="meta">
                {% if item.created_at %}
                <span><i class="far fa-clock me-1"></i>{{ item.created_at }}</span>
                {% endif %}
            </div>
            <pre class="secret">{{ item.secret_data }}</pre>
        </div>
    </div>
</body>

</html>
