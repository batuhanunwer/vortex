<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex - Neon Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(11, 22, 59, 0.8), rgba(3, 5, 11, 0.98)), url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-attachment: fixed; background-position: center; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* NEON KUTU */
        .neon-box {
            position: relative;
            width: 400px;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 3px;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2);
        }

        /* DÖNEN IŞIK */
        .neon-box::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 1000px;
            background: linear-gradient(#3b82f6, #1d4ed8);
            animation: animateNeon 4s linear infinite;
        }

        /* İÇ KAPAK */
        .neon-box::after {
            content: '';
            position: absolute;
            inset: 5px;
            background-image: linear-gradient(rgba(11, 22, 59, 0.8), rgba(3, 5, 11, 0.98)), url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-attachment: fixed; background-position: center;
            border-radius: 25px;
            z-index: 1;
        }

        @keyframes animateNeon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* İÇERİK KATMANI */
        .login-content {
            position: relative;
            z-index: 2; /* Arka plandaki kapak ve ışığın üstüne çıkması şart */
            padding: 40px;
            width: 100%;
        }

        .vortex-logo {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 7px;
            color: white;
            text-shadow: 0 0 10px #3b82f6;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-control { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #ffffff !important; 
            border-radius: 15px; 
            padding: 12px 20px;
            margin-bottom: 15px;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6) !important;
            opacity: 1;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.3);
        }

        .btn-login {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 15px;
            padding: 12px;
            font-weight: 800;
            color: white;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 204, 255, 0.4);
        }

        .alert-neon {
            background: rgba(212, 0, 212, 0.1);
            border: 1px solid rgba(212, 0, 212, 0.3);
            color: #ff66ff;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        /* ALT LİNK ALANI */
        .footer-link {
            text-align: center;
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }
    </style>
</head>
<body>
    
    <div class="neon-box">
        <div class="login-content">
            <div class="vortex-logo">VORTEX</div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-neon text-center py-2">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <input name="username" class="form-control" placeholder="Kullanıcı Adı" required autocomplete="off">
                <input name="password" type="password" class="form-control" placeholder="Şifre" required>
                <button type="submit" class="btn btn-primary btn-login w-100">GİRİŞ YAP</button>
            </form>

            <div class="footer-link">
                <small class="text-secondary">Hesabın yok mu? 
                    <a href="/register" class="text-info text-decoration-none fw-bold" style="text-shadow: 0 0 5px #3b82f6;">Kaydol</a>
                </small>
            </div>
        </div>
    </div>

</body>
</html>
